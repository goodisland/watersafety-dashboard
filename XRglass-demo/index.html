<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XRグラス 状況認識システム — デモ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw; height: 100vh;
      font-family: 'Courier New', monospace;
      color: #00ff88;
      user-select: none;
    }

    canvas#scene {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* スキャンライン */
    .scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none; z-index: 4;
    }

    /* スキャンスイープ */
    .scan-sweep {
      position: absolute;
      left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,255,136,0.35), transparent);
      pointer-events: none; z-index: 11;
      animation: sweep 4s linear infinite;
    }
    @keyframes sweep {
      0%   { top: 0%;   opacity: 1; }
      90%  { top: 100%; opacity: 0.4; }
      100% { top: 100%; opacity: 0; }
    }

    /* ビネット（レンズ効果） */
    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(
        ellipse at 50% 50%,
        transparent 52%,
        rgba(0,0,0,0.65) 82%,
        rgba(0,0,0,0.96) 100%
      );
      pointer-events: none; z-index: 5;
    }

    /* レンズフレーム */
    .lens-frame {
      position: absolute; inset: 10px;
      border: 1.5px solid rgba(0,255,136,0.12);
      border-radius: 14px;
      pointer-events: none; z-index: 6;
      box-shadow: inset 0 0 80px rgba(0,255,136,0.02);
    }

    /* HUD 全体 */
    .hud {
      position: absolute; inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    /* ─── 上部バー ─── */
    .hud-top {
      position: absolute;
      top: 22px; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }
    .hud-group { display: flex; align-items: center; gap: 14px; }

    .gps { font-size: 0.65rem; color: rgba(0,255,136,0.75); letter-spacing: 0.06em; }

    .badge {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(0,255,136,0.3);
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: #00ff88;
    }
    .badge.red {
      border-color: rgba(239,68,68,0.7);
      color: #ef4444;
      animation: blink-border 0.9s ease-in-out infinite;
    }
    @keyframes blink-border {
      0%,100% { border-color: rgba(239,68,68,0.7); }
      50%      { border-color: rgba(239,68,68,0.2); }
    }

    .rec-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.65rem; color: #ef4444; letter-spacing: 0.1em;
    }
    .rec-dot {
      width: 7px; height: 7px;
      background: #ef4444; border-radius: 50%;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }

    .hud-clock { font-size: 1.1rem; color: #00ff88; letter-spacing: 0.12em; }
    .stat-text { font-size: 0.62rem; color: rgba(0,255,136,0.65); letter-spacing: 0.05em; }

    /* ─── 左パネル ─── */
    .hud-left {
      position: absolute;
      left: 22px; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 8px;
    }
    .dp {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,255,136,0.22);
      border-radius: 6px;
      padding: 10px 14px;
      min-width: 148px;
    }
    .dp-title {
      font-size: 0.52rem;
      color: rgba(0,255,136,0.45);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(0,255,136,0.1);
      padding-bottom: 5px;
      margin-bottom: 7px;
    }
    .dp-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.67rem;
      margin-bottom: 4px;
    }
    .dp-key { color: rgba(0,255,136,0.5); }
    .dp-val { color: #00ff88; font-weight: bold; }
    .dp-val.warn { color: #f97316; }
    .dp-val.danger { color: #ef4444; }

    /* ─── 右パネル（アラートログ） ─── */
    .hud-right {
      position: absolute;
      right: 22px; top: 70px;
      width: 230px;
    }
    .alert-title {
      font-size: 0.52rem;
      color: rgba(239,68,68,0.8);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .alert-entry {
      background: rgba(0,0,0,0.65);
      border-left: 3px solid;
      border-radius: 0 4px 4px 0;
      padding: 5px 8px;
      font-size: 0.6rem;
      line-height: 1.5;
      margin-bottom: 4px;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .alert-entry.critical { border-color: #ef4444; color: #fca5a5; }
    .alert-entry.warning  { border-color: #f97316; color: #fdba74; }
    .alert-entry.info     { border-color: #38bdf8; color: #7dd3fc; }

    /* ─── 下部 ─── */
    .hud-bottom {
      position: absolute;
      bottom: 22px; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 28px;
    }

    /* コンパス */
    .compass {
      width: 78px; height: 78px;
      border: 1.5px solid rgba(0,255,136,0.28);
      border-radius: 50%;
      position: relative;
      background: rgba(0,0,0,0.45);
    }
    .compass-labels span {
      position: absolute;
      font-size: 0.52rem;
      color: rgba(0,255,136,0.55);
    }
    .compass svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* 中央ステータス */
    .hud-center-bottom {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px; opacity: 0.65;
    }
    .hud-center-bottom .location {
      font-size: 0.62rem; letter-spacing: 0.1em; color: #00ff88;
    }
    .hud-center-bottom .coverage {
      font-size: 0.55rem; color: rgba(0,255,136,0.5);
    }

    /* ─── ARレイヤー切り替えボタン ─── */
    .layer-controls {
      position: absolute;
      bottom: 22px; right: 22px;
      display: flex; flex-direction: column; gap: 5px;
      pointer-events: all;
    }
    .layer-label {
      font-size: 0.52rem;
      color: rgba(0,255,136,0.4);
      letter-spacing: 0.1em;
      margin-bottom: 3px;
    }
    .layer-btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,255,136,0.25);
      color: rgba(0,255,136,0.8);
      font-family: 'Courier New', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.07em;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 8px;
      text-align: left;
    }
    .layer-btn:hover { background: rgba(0,255,136,0.1); border-color: rgba(0,255,136,0.5); }
    .layer-btn.off { border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.28); }
    .layer-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ─── ターゲットレティクル ─── */
    .reticle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px;
      pointer-events: none; z-index: 8;
    }
    .reticle svg { width: 100%; height: 100%; }

    /* ══════════════════════════════════
       レスポンシブ
    ══════════════════════════════════ */
    @media (max-width: 640px) {
      .gps { display: none; }
      .hud-left { display: none; }
      .hud-right { width: 170px; top: 56px; right: 10px; }
      .alert-entry { font-size: 0.55rem; padding: 4px 6px; }
      .alert-panel-title { font-size: 0.48rem; }
      .hud-clock { font-size: 0.88rem; letter-spacing: 0.07em; }
      .stat-text { font-size: 0.55rem; }
      .rec-badge { font-size: 0.58rem; }
      .hud-top { padding: 0 12px; top: 14px; }
      .hud-bottom { padding: 0 12px; bottom: 12px; }
      .compass { width: 58px; height: 58px; }
      .hud-center-bottom { display: none; }
      .layer-controls { bottom: 12px; right: 10px; }
      .layer-btn { font-size: 0.58rem; padding: 5px 8px; gap: 5px; }
      .layer-label { font-size: 0.48rem; }
      .layer-dot { width: 6px; height: 6px; }
      .reticle { width: 32px; height: 32px; }
    }

    @media (max-width: 380px) {
      .hud-right { display: none; }
      .badge { font-size: 0.52rem; padding: 2px 6px; }
    }
  </style>
</head>
<body>

<canvas id="scene"></canvas>
<div class="scanlines"></div>
<div class="scan-sweep"></div>
<div class="vignette"></div>
<div class="lens-frame"></div>

<!-- 中央レティクル -->
<div class="reticle">
  <svg viewBox="0 0 40 40" fill="none">
    <circle cx="20" cy="20" r="10" stroke="rgba(0,255,136,0.25)" stroke-width="1"/>
    <line x1="20" y1="2"  x2="20" y2="8"  stroke="rgba(0,255,136,0.4)" stroke-width="1"/>
    <line x1="20" y1="32" x2="20" y2="38" stroke="rgba(0,255,136,0.4)" stroke-width="1"/>
    <line x1="2"  y1="20" x2="8"  y2="20" stroke="rgba(0,255,136,0.4)" stroke-width="1"/>
    <line x1="32" y1="20" x2="38" y2="20" stroke="rgba(0,255,136,0.4)" stroke-width="1"/>
  </svg>
</div>

<div class="hud">

  <!-- 上部バー -->
  <div class="hud-top">
    <div class="hud-group">
      <span class="gps" id="gpsDisplay">GPS: 35.308°N  139.482°E</span>
      <span class="badge">● LIVE</span>
      <span class="badge red" id="alertBadge" style="display:none">⚠ ALERT</span>
    </div>
    <div class="rec-badge">
      <div class="rec-dot"></div>REC
    </div>
    <div class="hud-group">
      <span class="stat-text" id="battDisplay">⚡ 87%</span>
      <span class="stat-text">📶 4G</span>
      <span class="stat-text">AI ✓</span>
      <span class="hud-clock" id="hudClock">--:--:--</span>
    </div>
  </div>

  <!-- 左：波浪データ・検出状況 -->
  <div class="hud-left" id="panelWave">
    <div class="dp">
      <div class="dp-title">波浪データ</div>
      <div class="dp-row"><span class="dp-key">波高</span><span class="dp-val warn" id="waveH">2.8m</span></div>
      <div class="dp-row"><span class="dp-key">周期</span><span class="dp-val" id="waveP">11.2s</span></div>
      <div class="dp-row"><span class="dp-key">水温</span><span class="dp-val" id="waterT">24.5°C</span></div>
      <div class="dp-row"><span class="dp-key">潮流速度</span><span class="dp-val warn" id="currentS">1.4m/s</span></div>
    </div>
    <div class="dp">
      <div class="dp-title">検出状況</div>
      <div class="dp-row"><span class="dp-key">遊泳者</span><span class="dp-val" id="personCount">5名</span></div>
      <div class="dp-row"><span class="dp-key">危険ゾーン</span><span class="dp-val" id="dangerCount">0名</span></div>
      <div class="dp-row"><span class="dp-key">AI信頼度</span><span class="dp-val" id="confidence">98.2%</span></div>
    </div>
  </div>

  <!-- 右：アラートログ -->
  <div class="hud-right">
    <div class="alert-title">▶ ALERT LOG</div>
    <div id="alertLog"></div>
  </div>

  <!-- 下部 -->
  <div class="hud-bottom">
    <!-- コンパス -->
    <div class="compass">
      <span style="position:absolute;top:3px;left:50%;transform:translateX(-50%);font-size:0.5rem;color:rgba(0,255,136,0.55)">N</span>
      <span style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-size:0.5rem;color:rgba(0,255,136,0.55)">S</span>
      <span style="position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:0.5rem;color:rgba(0,255,136,0.55)">E</span>
      <span style="position:absolute;left:5px;top:50%;transform:translateY(-50%);font-size:0.5rem;color:rgba(0,255,136,0.55)">W</span>
      <svg viewBox="0 0 78 78" fill="none">
        <circle cx="39" cy="39" r="35" stroke="rgba(0,255,136,0.12)" stroke-width="1"/>
        <line x1="39" y1="10" x2="39" y2="30" stroke="#ef4444" stroke-width="2"/>
        <line x1="39" y1="48" x2="39" y2="68" stroke="rgba(0,255,136,0.35)" stroke-width="1.5"/>
        <circle cx="39" cy="39" r="3" fill="rgba(0,255,136,0.4)"/>
      </svg>
    </div>

    <div class="hud-center-bottom">
      <div class="location">片瀬西浜 — 監視エリアA</div>
      <div class="coverage">COVERAGE: 320m  |  ALTITUDE: 22m</div>
    </div>

    <div style="width:170px"></div>
  </div>

  <!-- ARレイヤー切り替え -->
  <div class="layer-controls">
    <div class="layer-label">AR LAYERS</div>
    <button class="layer-btn on" id="btn-persons"    onclick="toggleLayer('persons')">
      <span class="layer-dot" style="background:#22c55e"></span>人物検出
    </button>
    <button class="layer-btn on" id="btn-ripcurrent" onclick="toggleLayer('ripcurrent')">
      <span class="layer-dot" style="background:#ef4444"></span>離岸流ゾーン
    </button>
    <button class="layer-btn on" id="btn-grid"       onclick="toggleLayer('grid')">
      <span class="layer-dot" style="background:#38bdf8"></span>ARグリッド
    </button>
    <button class="layer-btn on" id="btn-wavedata"   onclick="toggleLayer('wavedata')">
      <span class="layer-dot" style="background:#fbbf24"></span>波浪オーバーレイ
    </button>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════
   初期化
══════════════════════════════════════════════ */
const canvas = document.getElementById('scene');
const ctx    = canvas.getContext('2d');

const layers = { persons: true, ripcurrent: true, grid: true, wavedata: true };

function toggleLayer(name) {
  layers[name] = !layers[name];
  const btn = document.getElementById('btn-' + name);
  btn.className = 'layer-btn ' + (layers[name] ? 'on' : 'off');
}

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/* ═══════════════════════════════════════════
   遊泳者データ
══════════════════════════════════════════════ */
const PERSONS = [
  { id:'P-001', x:0.20, y:0.62, vx: 0.00045, depth:0.6, inRip:false, alertTimer:0 },
  { id:'P-002', x:0.38, y:0.59, vx: 0.00070, depth:0.9, inRip:false, alertTimer:0 },
  { id:'P-003', x:0.56, y:0.64, vx: 0.00038, depth:1.2, inRip:false, alertTimer:0 },
  { id:'P-004', x:0.70, y:0.61, vx:-0.00055, depth:0.7, inRip:false, alertTimer:0 },
  { id:'P-005', x:0.82, y:0.63, vx: 0.00048, depth:0.8, inRip:false, alertTimer:0 },
];

const RIP = { x: 0.47, w: 0.17 }; // 離岸流ゾーン（正規化）

let frame = 0;
let alertActive = false;

/* ═══════════════════════════════════════════
   描画
══════════════════════════════════════════════ */
function draw() {
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const skyH  = H * 0.30;
  const seaH  = H * 0.42;
  const seaY  = skyH;
  const sandY = seaY + seaH;

  drawSky(W, skyH);
  drawSea(W, seaY, seaH);
  if (layers.grid)       drawARGrid(W, seaY, seaH);
  drawWaves(W, seaY, seaH);
  if (layers.ripcurrent) drawRipZone(W, seaY, seaH);
  drawSand(W, sandY, H - sandY);
  if (layers.persons)    drawPersons(W, H, seaY, seaH);
  if (layers.wavedata)   drawWaveBar(W, seaY, seaH);

  // 全体にほんのりグリーンティント
  ctx.fillStyle = 'rgba(0,20,8,0.07)';
  ctx.fillRect(0, 0, W, H);
}

/* ─── 空 ─── */
function drawSky(W, skyH) {
  const g = ctx.createLinearGradient(0, 0, 0, skyH);
  g.addColorStop(0, '#3a6a96');
  g.addColorStop(1, '#6da8cc');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, skyH);

  // 雲
  const clouds = [
    {xn:0.10,yn:0.25,r:42},{xn:0.34,yn:0.15,r:56},
    {xn:0.60,yn:0.30,r:38},{xn:0.83,yn:0.18,r:60},
  ];
  clouds.forEach(c => {
    const cx = ((c.xn + frame * 0.00004) % 1.05) * W;
    const cy = c.yn * skyH;
    const g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, c.r);
    g2.addColorStop(0, 'rgba(255,255,255,0.82)');
    g2.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g2;
    ctx.beginPath();
    ctx.arc(cx, cy, c.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

/* ─── 海 ─── */
function drawSea(W, seaY, seaH) {
  const g = ctx.createLinearGradient(0, seaY, 0, seaY + seaH);
  g.addColorStop(0, '#1a6fa8');
  g.addColorStop(1, '#0d3f6e');
  ctx.fillStyle = g;
  ctx.fillRect(0, seaY, W, seaH);
}

/* ─── ARグリッド（水面投影） ─── */
function drawARGrid(W, seaY, seaH) {
  ctx.save();
  ctx.globalAlpha = 0.16;
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 0.6;

  // 水平線（透視感）
  for (let r = 0; r <= 8; r++) {
    const y = seaY + (r / 8) * seaH;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // 垂直線（消失点に向かう）
  const vx = W * 0.5;
  for (let c = 0; c <= 18; c++) {
    const bx = (c / 18) * W;
    ctx.beginPath();
    ctx.moveTo(vx + (bx - vx) * 0.08, seaY);
    ctx.lineTo(bx, seaY + seaH);
    ctx.stroke();
  }
  ctx.restore();
}

/* ─── 波 ─── */
function drawWaves(W, seaY, seaH) {
  for (let w = 0; w < 5; w++) {
    const wy = seaY + seaH * (0.14 + w * 0.16) + Math.sin(frame * 0.04 + w) * 3;
    ctx.strokeStyle = 'rgba(255,255,255,0.09)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let px = 0; px <= W; px += 6) {
      const py = wy + Math.sin(px * 0.014 + frame * 0.05 + w * 0.9) * 3;
      px === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
  }
}

/* ─── 離岸流ゾーン ─── */
function drawRipZone(W, seaY, seaH) {
  const rx = RIP.x * W;
  const rw = RIP.w * W;

  // 面塗り
  const pulse = 0.28 + Math.sin(frame * 0.07) * 0.10;
  const gFill = ctx.createLinearGradient(rx, 0, rx + rw, 0);
  gFill.addColorStop(0,   `rgba(239,68,68,0)`);
  gFill.addColorStop(0.5, `rgba(239,68,68,${pulse})`);
  gFill.addColorStop(1,   `rgba(239,68,68,0)`);
  ctx.fillStyle = gFill;
  ctx.fillRect(rx, seaY, rw, seaH);

  // 流れ矢印（上向き）
  for (let a = 0; a < 4; a++) {
    const ax = rx + rw * (0.2 + a * 0.2);
    const ph = ((frame * 0.04 + a * 0.25) % 1);
    const ay = seaY + seaH * (0.9 - ph * 0.85);
    const al = Math.sin(ph * Math.PI) * 0.65;
    ctx.save();
    ctx.globalAlpha = al;
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(ax, ay + 14); ctx.lineTo(ax, ay - 14);
    ctx.moveTo(ax - 5, ay - 8); ctx.lineTo(ax, ay - 14); ctx.lineTo(ax + 5, ay - 8);
    ctx.stroke();
    ctx.restore();
  }

  // 点線ボーダー
  const ba = 0.55 + Math.sin(frame * 0.12) * 0.35;
  ctx.save();
  ctx.strokeStyle = `rgba(239,68,68,${ba})`;
  ctx.lineWidth = 1.8;
  ctx.setLineDash([8, 4]);
  ctx.lineDashOffset = -frame * 0.6;
  ctx.strokeRect(rx + 1, seaY + 2, rw - 2, seaH - 4);
  ctx.setLineDash([]);
  ctx.restore();

  // ラベル
  const lx = rx + rw / 2;
  const ly = seaY + 20;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(lx - 74, ly - 13, 148, 19);
  ctx.strokeStyle = 'rgba(239,68,68,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(lx - 74, ly - 13, 148, 19);
  ctx.fillStyle = '#ef4444';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('⚠  離岸流 危険ゾーン', lx, ly);
  ctx.textAlign = 'left';
  ctx.restore();
}

/* ─── 砂浜 ─── */
function drawSand(W, sandY, sandH) {
  const g = ctx.createLinearGradient(0, sandY, 0, sandY + sandH);
  g.addColorStop(0, '#c8a060');
  g.addColorStop(1, '#a07838');
  ctx.fillStyle = g;
  ctx.fillRect(0, sandY, W, sandH);

  // 波打ち際
  ctx.fillStyle = 'rgba(200,218,230,0.16)';
  ctx.beginPath();
  for (let px = 0; px <= W; px += 6) {
    const py = sandY + Math.sin(px * 0.012 + frame * 0.03) * 5;
    px === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.lineTo(W, sandY + 14); ctx.lineTo(0, sandY + 14);
  ctx.closePath(); ctx.fill();
}

/* ─── 人物 + AR検出ボックス ─── */
function drawPersons(W, H, seaY, seaH) {
  let danger = 0;

  PERSONS.forEach((p, i) => {
    // 移動
    p.x += p.vx;
    if (p.x < 0.04) { p.x = 0.04; p.vx *= -1; }
    if (p.x > 0.96) { p.x = 0.96; p.vx *= -1; }

    // 離岸流チェック
    if (p.x > RIP.x && p.x < RIP.x + RIP.w) {
      p.inRip = true; p.alertTimer = 100;
    } else {
      if (p.alertTimer > 0) p.alertTimer--;
      else p.inRip = false;
    }
    if (p.inRip) danger++;

    const sx = p.x * W;
    const sy = seaY + seaH * 0.52 + Math.sin(frame * 0.04 + i * 1.3) * 7;
    const sc = 0.65 + p.depth * 0.3;
    const r  = 9 * sc;

    // 水面揺れ反射
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = p.inRip ? '#ff6060' : '#fbbf24';
    ctx.beginPath();
    ctx.ellipse(sx, sy + r * 1.8, r * 0.6, r * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 体
    ctx.fillStyle = p.inRip ? '#ff6060' : '#fbbf24';
    ctx.beginPath();
    ctx.ellipse(sx, sy + r * 0.5, r * 0.55, r, 0, 0, Math.PI * 2);
    ctx.fill();

    // 頭
    ctx.fillStyle = p.inRip ? '#fca5a5' : '#fde68a';
    ctx.beginPath();
    ctx.arc(sx, sy - r * 0.65, r * 0.55, 0, Math.PI * 2);
    ctx.fill();

    // 検出ボックス
    const bw = r * 2.8, bh = r * 3.6;
    const bx = sx - bw / 2, by = sy - r * 1.5;

    if (p.inRip) {
      const ba = 0.65 + Math.sin(frame * 0.18) * 0.3;

      // 赤ボックス
      ctx.save();
      ctx.strokeStyle = `rgba(239,68,68,${ba})`;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(bx, by, bw, bh);

      // コーナーブラケット
      const cl = 7;
      ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2.2;
      [[0,0],[1,0],[0,1],[1,1]].forEach(([cx,cy]) => {
        const ex = bx + cx * bw, ey = by + cy * bh;
        const dx = cx === 0 ? 1 : -1, dy = cy === 0 ? 1 : -1;
        ctx.beginPath();
        ctx.moveTo(ex, ey + dy * cl); ctx.lineTo(ex, ey); ctx.lineTo(ex + dx * cl, ey);
        ctx.stroke();
      });

      // ALERT ラベル
      ctx.fillStyle = 'rgba(239,68,68,0.92)';
      ctx.fillRect(bx, by - 18, bw, 16);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('⚠ ALERT', sx, by - 6);

      // 情報カード（右側）
      const cx2 = sx + bw / 2 + 10, cy2 = by;
      ctx.fillStyle = 'rgba(0,0,0,0.78)';
      ctx.fillRect(cx2, cy2, 108, 58);
      ctx.strokeStyle = 'rgba(239,68,68,0.45)';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx2, cy2, 108, 58);
      ctx.fillStyle = '#ef4444'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
      ctx.fillText(p.id, cx2 + 6, cy2 + 13);
      ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = '8px monospace';
      ctx.fillText('状態: 危険ゾーン', cx2 + 6, cy2 + 26);
      ctx.fillText(`深度: ~${(p.depth * 1.5).toFixed(1)}m`, cx2 + 6, cy2 + 38);
      ctx.fillText('要救助: YES', cx2 + 6, cy2 + 50);

      // 点線
      ctx.strokeStyle = 'rgba(239,68,68,0.35)'; ctx.lineWidth = 0.8;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(bx + bw, by + bh / 2); ctx.lineTo(cx2, cy2 + 29);
      ctx.stroke(); ctx.setLineDash([]);

      ctx.restore();
      ctx.textAlign = 'left';

    } else {
      // 緑ボックス
      ctx.save();
      ctx.strokeStyle = 'rgba(34,197,94,0.65)';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, bw, bh);
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(bx, by - 14, bw, 12);
      ctx.fillStyle = '#22c55e'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
      ctx.fillText(p.id, sx, by - 5);
      ctx.textAlign = 'left';
      ctx.restore();
    }

    // 距離表示
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '7px monospace'; ctx.textAlign = 'center';
    const dist = (18 + p.x * 28 + (1 - p.depth) * 8).toFixed(0);
    ctx.fillText(`~${dist}m`, sx, by + bh + 10);
    ctx.textAlign = 'left';
    ctx.restore();
  });

  // HUD更新
  document.getElementById('personCount').textContent = PERSONS.length + '名';
  const dEl = document.getElementById('dangerCount');
  dEl.textContent = danger + '名';
  dEl.className = 'dp-val ' + (danger > 0 ? 'danger' : '');

  // アラートバッジ
  const badge = document.getElementById('alertBadge');
  if (danger > 0 && !alertActive) {
    alertActive = true;
    badge.style.display = '';
  } else if (danger === 0 && alertActive) {
    alertActive = false;
    badge.style.display = 'none';
  }
}

/* ─── 波高バー（左端） ─── */
function drawWaveBar(W, seaY, seaH) {
  const bx = 10, by = seaY + seaH * 0.1;
  const bh = seaH * 0.8, bw = 6;

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(bx, by, bw, bh);

  const wh = 2.8 + Math.sin(frame * 0.003) * 0.2;
  const fh = (wh / 5.0) * bh;
  const fy = by + bh - fh;

  const g = ctx.createLinearGradient(0, fy, 0, by + bh);
  g.addColorStop(0, '#ef4444');
  g.addColorStop(0.5, '#f97316');
  g.addColorStop(1, '#22c55e');
  ctx.fillStyle = g;
  ctx.fillRect(bx, fy, bw, fh);

  ctx.fillStyle = 'rgba(0,255,136,0.55)';
  ctx.font = '7px monospace';
  ctx.fillText('▲', bx - 1, by - 5);
  ctx.fillText('波高', bx - 1, by - 14);
}

/* ═══════════════════════════════════════════
   アラートログ
══════════════════════════════════════════════ */
const ALERTS = [
  { msg:'P-003 離岸流ゾーン侵入確認', level:'critical' },
  { msg:'波高 2.8m 警戒水位超過', level:'warning' },
  { msg:'遊泳者数 増加傾向 — 5名検出', level:'info' },
  { msg:'P-001 潮流方向に流されつつある', level:'warning' },
  { msg:'ドローン CAM-2 接続確認', level:'info' },
  { msg:'P-002 危険ゾーン近接 100m以内', level:'warning' },
  { msg:'AI検出精度 98.2% 正常動作中', level:'info' },
  { msg:'潮流速度 1.4m/s — 上昇傾向', level:'warning' },
  { msg:'片瀬西浜 遊泳者密度 高', level:'info' },
  { msg:'P-003 ライフガード対応開始', level:'critical' },
];

function addAlert() {
  const tpl = ALERTS[Math.floor(Math.random() * ALERTS.length)];
  const t   = new Date().toTimeString().slice(0, 8);
  const log = document.getElementById('alertLog');
  const el  = document.createElement('div');
  el.className = `alert-entry ${tpl.level}`;
  el.textContent = `${t}  ${tpl.msg}`;
  log.insertBefore(el, log.firstChild);
  while (log.children.length > 7) log.removeChild(log.lastChild);
}

/* ═══════════════════════════════════════════
   HUD 更新
══════════════════════════════════════════════ */
function updateHUD() {
  document.getElementById('hudClock').textContent =
    new Date().toTimeString().slice(0, 8);

  const wh = (2.8 + Math.sin(frame * 0.003) * 0.18).toFixed(1);
  const wp = (11.2 + Math.sin(frame * 0.002) * 0.25).toFixed(1);
  const cs = (1.4 + Math.sin(frame * 0.004) * 0.08).toFixed(1);
  document.getElementById('waveH').textContent     = wh + 'm';
  document.getElementById('waveP').textContent     = wp + 's';
  document.getElementById('currentS').textContent  = cs + 'm/s';

  const conf = (97.5 + Math.sin(frame * 0.01) * 1.2).toFixed(1);
  document.getElementById('confidence').textContent = conf + '%';

  const batt = Math.max(10, 87 - Math.floor(frame / 4000));
  document.getElementById('battDisplay').textContent = `⚡ ${batt}%`;
}

/* ═══════════════════════════════════════════
   アニメーションループ
══════════════════════════════════════════════ */
function animate() {
  frame++;
  draw();
  updateHUD();
  requestAnimationFrame(animate);
}
animate();

addAlert(); addAlert(); addAlert();
setInterval(addAlert, 7000);
setInterval(() => {
  document.getElementById('hudClock').textContent =
    new Date().toTimeString().slice(0, 8);
}, 1000);
</script>
